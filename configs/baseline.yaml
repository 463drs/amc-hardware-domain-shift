data:
  path: data/subset_fpp384_seed1234_snr-20_30.hdf5
  frames_per_pair: 384
  subset_seed: 1234
  snr_min: -20
  snr_max: 30
  split: [0.7, 0.15, 0.15]
  split_seed: 5678
  normalization: unit_power
model:
  dropout_p: 0.5
  init_scheme: kaiming_linear
train:
  seed: 0
  batch_size: 256
  num_workers: 4
  optimizer:
    name: adam
    kwargs: {}
  learning_rate: 0.001
  weight_decay: 0.0001
  lr_scheduler:
    name: reduce_on_plateau
    kwargs:
      factor: 0.5
      patience: 5
  max_epochs: 150
  early_stopping_patience: 10
  early_stopping_metric: val_loss
  amp_enabled: false
experiment:
  project: amc-hardware-domain-shift
  condition: baseline
  mode: online