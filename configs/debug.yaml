# Tiny, CPU-runnable config
# High SNR + few frames keeps it fast and makes constellations clean for sanity checks.
data:
  path: data/GOLD_XYZ_OSC.0001_1024.hdf5
  frames_per_pair: 20        # 20 frames per (class, SNR) cell
  subset_seed: 1234
  snr_min: 20                # high SNR only -> fast + clean constellations
  snr_max: 30
  split: [0.7, 0.15, 0.15]   # 20 -> 14 / 3 / 3 per cell
  split_seed: 5678
  normalization: unit_power
model:
  dropout_p: 0.5
  init_scheme: kaiming_linear
train:
  seed: 0
  batch_size: 16
  num_workers: 0             # 0 workers: simplest, no fork/spawn on a laptop
  optimizer:
    name: adam
    kwargs: {}
  learning_rate: 0.001
  weight_decay: 0.0
  lr_scheduler:
    name: reduce_on_plateau
    kwargs:
      mode: min
      factor: 0.5
      patience: 2
  max_epochs: 3              # tiny ceiling: this config is just a fast end-to-end smoke run
  early_stopping_patience: 2
  early_stopping_metric: val_loss
  amp_enabled: false         # CPU debug run: keep full precision, no AMP
experiment:
  project: amc-hardware-domain-shift
  condition: debug
  mode: disabled             # no W&B for the fast smoke run / tests (no account/network needed)
